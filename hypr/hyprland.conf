source = ~/.config/theme/hyprland-colors.conf

################
### MONITORS ###
################

monitor = , preferred, auto, 1

###################
### MY PROGRAMS ###
###################

$terminal    = kitty
$fileManager = dolphin
$menu        = rofi -show run -i

#################
### AUTOSTART ###
#################

exec-once = dunst
exec-once = hypridle
exec-once = waybar
exec-once = swww-daemon
exec-once = ~/.config/hypr/scripts/wallpaper.sh

exec-once = [workspace 2 silent] firefox
exec-once = [workspace 3 silent] sleep 2 && kitty
exec-once = [workspace 4 silent] kitty --title btop -e btop
exec-once = [workspace special:magic silent] kitty --class magic -e fastfetch

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_SCREENSHOTS_DIR,$HOME/media/pictures/screenshots

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in             = 4
    gaps_out            = 3, 12, 17, 12
    border_size         = 2
    col.active_border   = $col_border_active
    col.inactive_border = $col_border_inactive
    resize_on_border    = false
    allow_tearing       = false
    layout              = dwindle
}

decoration {
    rounding         = 6
    rounding_power   = 2
    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = $col_shadow
    }

    blur {
        enabled  = false
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 1.94, almostLinear, fade
    animation = workspacesIn,  1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = zoomFactor,    1, 7,    quick
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo   = false
    close_special_on_empty  = false
}

#############
### INPUT ###
#############

input {
    kb_layout  = no
    kb_options = caps:swapescape
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}

###########################
### WORKSPACE LAYOUTS    ###
###########################
# WS 1     — dwindle   (default; inherits general.layout, no rule needed)
#
# WS 2     — master    (Firefox as dominant master on the left,
#                        any extra windows stack on the right)
workspace = 2, layout:master, layoutopt:orientation:left

# WS 3     — scrolling (tmux+nvim as the first column, extra terminals
#                        open as new columns scrolling to the right)
workspace = 3, layout:scrolling

# WS 4     — monocle   (btop fills the screen; cycle with layoutmsg cyclenext)
workspace = 4, layout:monocle

# WS 5–10  — dwindle   (default; inherits general.layout, no rule needed)

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Apps
bind = $mainMod,       Q, exec,      $terminal
bind = $mainMod,       E, exec,      $fileManager
bind = $mainMod,       R, exec,      $menu

# Window management
bind = $mainMod,       C, killactive,
bind = $mainMod,       V, togglefloating,
bind = $mainMod,       P, pseudo,
bind = $mainMod,       T, layoutmsg, togglesplit  # dwindle only; no-op on other layouts

# Exit
bind = $mainMod,       M, exec, ~/.config/hypr/scripts/powermenu.sh

# Focus (hjkl)
bind = $mainMod,       H, movefocus, l
bind = $mainMod,       L, movefocus, r
bind = $mainMod,       K, movefocus, u
bind = $mainMod,       J, movefocus, d

# Move window (hjkl)
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, J, swapwindow, d

# Scrolling layout - Reorder columns
bind = $mainMod CTRL, H, layoutmsg, swapcol l
bind = $mainMod CTRL, L, layoutmsg, swapcol r

# Move the focused window into a new column (splits it out)
bind = $mainMod CTRL, J, layoutmsg, move +col
bind = $mainMod CTRL, K, layoutmsg, move -col

# Monocle layout - cycle through windows
bind = $mainMod ALT, J, layoutmsg, cyclenext
bind = $mainMod ALT, K, layoutmsg, cycleprev

# Resize mode
bind  = $mainMod, W, submap, resize
submap = resize
binde = , h, resizeactive, -20  0
binde = , l, resizeactive,  20  0
binde = , k, resizeactive,   0 -20
binde = , j, resizeactive,   0  20
bind  = , escape, submap, reset
bind  = , return, submap, reset
submap = reset

# Workspaces — switch
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Workspaces — move window
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace,        special:magic

# Scroll through workspaces with mouse wheel
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume    @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute      @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute      @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

# Screenshots
bind = ,    Print, exec, grimblast --notify copysave screen
bind = ALT, Print, exec, grimblast --notify copysave output
bind = CTRL,Print, exec, grimblast --notify copysave area

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Dropdown terminal — slides down from the top, lives in special:dropdown
windowrule {
    name           = dropdown-terminal
    match:class    = dropdown
    float          = true
    size           = 100% 50%
    move           = 12 40
    workspace      = special:dropdown
    opacity        = 0.90 override 0.90 override
    animation      = slidedown
}

# Suppress maximize events globally (prevents apps from forcing themselves fullscreen)
windowrule {
    name           = suppress-maximize-events
    match:class    = .*
    suppress_event = maximize
}

# Fix XWayland drag artifacts — phantom windows with no class/title
windowrule {
    name             = fix-xwayland-drags
    match:class      = ^$
    match:title      = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false
    no_focus         = true
}

# hyprland-run — float near the bottom-left of the screen
windowrule {
    name        = move-hyprland-run
    match:class = hyprland-run
    float       = true
    move        = 20 monitor_h-120
}
