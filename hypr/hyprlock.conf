background {
    monitor =
    path    = ~/Pictures/Wallpapers/current.jpg
    blur_passes = 2
    blur_size   = 7
    brightness  = 0.5
}

input-field {
    monitor =
    size    = 300 50
    outline_thickness = 2
    
    outer_color  = rgb(cba6f7)   # mauve
    inner_color  = rgb(1e1e2e)   # base
    font_color   = rgb(cdd6f4)   # text
    check_color  = rgb(89b4fa)   # blue
    fail_color   = rgb(f38ba8)   # red
    
    placeholder_text = <i>Password...</i>
    hide_input       = false
    
    position = 0, -100
    halign   = center
    valign   = center
}

label {
    monitor =
    text    = cmd[update:1000] echo "$(date +"%H:%M")"
    color   = rgb(cdd6f4)
    font_size = 64
    font_family = JetBrainsMono Nerd Font

    position = 0, 200
    halign   = center
    valign   = center
}
