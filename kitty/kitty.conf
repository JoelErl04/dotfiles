##############
### FONTS  ###
##############

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Nerd Font symbol map
symbol_map U+E0A0-U+E0A3,U+E0C0-U+E0C7 PowerlineSymbols

###################
### TRANSPARENCY ###
###################

# background_opacity only affects cells with the default bg color.
# The Hyprland windowrule handles overall window transparency + blur.
background_opacity      1.0
dynamic_background_opacity yes

###############
### CURSOR  ###
###############

cursor_shape              beam
cursor_beam_thickness     1.5
cursor_blink_interval     0
cursor_stop_blinking_after 0

################
### TERMINAL ###
################

scrollback_lines        10000
copy_on_select          yes
strip_trailing_spaces   smart
focus_follows_mouse     yes

# Shell integration (gives prompt tracking, better scrollback, etc.)
shell			/bin/zsh
shell_integration       enabled

##################
### PERFORMANCE ###
##################

repaint_delay    8
input_delay      2
sync_to_monitor  yes

###############
### WINDOW  ###
###############

window_padding_width     8
window_margin_width      0
placement_strategy       center
remember_window_size     yes
initial_window_width     120c
initial_window_height    32c
confirm_os_window_close  0

# Hide title bar decorations on Wayland
wayland_titlebar_color  background
hide_window_decorations yes

##########
### UI ###
##########

# Tab bar
tab_bar_edge             bottom
tab_bar_style            powerline
tab_powerline_style      slanted
tab_title_template       "{index}: {title}"
active_tab_font_style    bold
inactive_tab_font_style  normal

################
### KEYBOARD ###
################

# Reload config without restarting
map ctrl+shift+f5  load_config_file

# Opacity controls
map ctrl+shift+equal    set_background_opacity +0.05
map ctrl+shift+minus    set_background_opacity -0.05
map ctrl+shift+backspace set_background_opacity default

# Font size
map ctrl+shift+]   change_font_size all +1.0
map ctrl+shift+[   change_font_size all -1.0
map ctrl+shift+0   change_font_size all 0

# Tabs
map ctrl+shift+t   new_tab
map ctrl+shift+w   close_tab
map ctrl+shift+l   next_tab
map ctrl+shift+h   previous_tab

# Windows (kitty splits)
map ctrl+shift+enter  new_window
map ctrl+shift+q      close_window

##############
### COLORS ###
##############

include ~/.config/theme/kitty-colors.conf

url_style           curly
